name: Dynamic Profile Updater (Stats, Snake & 3D Graph)

on:
  schedule:
    # Runs automatically every 12 hours
    - cron: "0 */12 * * *"
  
  # Allow manual trigger from the Actions tab
  workflow_dispatch:
  
  # Run on push to main branch
  push:
    branches:
      - main

jobs:
  update-profile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10
    
    steps:
      # Step 1: Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # Step 3: Run the LeetCode & Codeforces stats updater script
      - name: Run Stats Updater
        run: python update_stats.py

      # Step 4: Commit and push updated README back to main
      - name: Commit and Push README changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          # Only commit and push if README.md has changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: update stats" && git push origin main)

      # Step 5: Generates a snake game from a github user's contributions graph, outputs a svg animation
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: DivyanshAhuja08
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      # Step 6: Generate 3D contribution graph
      - name: Generate 3D contribution graph
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: DivyanshAhuja08

      # Step 7: Move 3D contribution SVGs into the dist directory for deploy
      - name: Move 3D graph to dist
        run: |
          mv profile-3d-contrib dist/
          
      # Step 8: Push the contribution snake & 3D graph SVGs to the output branch
      - name: Push SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
